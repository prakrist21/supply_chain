<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Supply Chain System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background: #F9FAFB;
            padding: 32px 0;
        }

        .register-container {
            max-width: 540px;
            width: 100%;
            padding: 24px;
        }

        .register-box {
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .register-box h2 {
            text-align: center;
            margin: 0 0 4px 0;
            font-size: 24px;
            font-weight: 700;
            color: #1A1F2E;
            letter-spacing: -0.5px;
            line-height: 1.6;
        }

        .register-subtitle {
            text-align: center;
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .register-box label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1A1F2E;
        }

        .register-box input,
        .register-box select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #E5E7EB;
            font-size: 15px;
            outline: none;
            background: #FFFFFF;
            color: #1A1F2E;
            transition: all 0.15s ease;
            box-sizing: border-box;
        }

        .register-box input:focus,
        .register-box select:focus {
            border-color: #00BF62;
            box-shadow: 0 0 0 3px rgba(0, 191, 98, 0.1);
        }

        .register-box button {
            width: 100%;
            padding: 12px 24px;
            margin-top: 8px;
            background: #00BF62;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 12px rgba(0, 191, 98, 0.25);
        }

        .register-box button:hover {
            background: #009951;
        }

        .divider {
            text-align: center;
            margin: 20px 0 16px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #E5E7EB;
        }

        .divider span {
            position: relative;
            background: #FFFFFF;
            padding: 0 16px;
            font-size: 14px;
            color: #6B7280;
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            margin-top: 0;
            color: #6B7280;
            line-height: 1.6;
        }

        .login-link a {
            color: #00BF62;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.15s ease;
        }

        .login-link a:hover {
            color: #009951;
        }

        .error-message {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
            text-align: center;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            line-height: 1.6;
        }

        .success-message {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #6EE7B7;
            text-align: center;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            line-height: 1.6;
        }

        .password-hint {
            font-size: 13px;
            color: #6B7280;
            margin-top: 4px;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .register-container {
                padding: 16px;
            }

            .register-box {
                padding: 32px 24px;
            }

            .register-box h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<div class="register-container">
    <div class="register-box">
        <h2>Create Your Account</h2>
        <p class="register-subtitle">Join as a contractor to bid on projects</p>

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group full-width">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Choose a unique username">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password1" required placeholder="Enter password">
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password2" required placeholder="Re-enter password">
                </div>
            </div>

            <p class="password-hint">Password must be at least 8 characters long</p>

            <div class="form-group full-width">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Enter your full name">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" name="contact" required placeholder="e.g. 9812345678">
                </div>

                <div class="form-group">
                    <label>Experience (Years)</label>
                    <input type="number" name="experience" required placeholder="e.g. 5" min="0">
                </div>
            </div>

            <div class="form-group full-width">
                <label>Email Address</label>
                <input type="email" name="contact_email" required placeholder="your.email@example.com">
            </div>

            <div class="form-group full-width">
                <label>Role / Specialization</label>
                <input type="text" name="role" required placeholder="e.g. Civil Engineer, Contractor">
            </div>

            <button type="submit">Create Account</button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <p class="login-link">
            Already have an account?
            <a href="{% url 'login' %}">Sign in</a>
        </p>
    </div>
</div>

</body>
</html>

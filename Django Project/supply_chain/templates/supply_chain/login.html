<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Supply Chain System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F9FAFB;
        }

        .login-container {
            max-width: 440px;
            width: 100%;
            padding: 24px;
        }

        .login-box {
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .login-box h2 {
            text-align: center;
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 700;
            color: #1A1F2E;
            letter-spacing: -0.5px;
            line-height: 1.6;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .login-box label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1A1F2E;
        }

        .login-box input,
        .login-box select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #E5E7EB;
            font-size: 15px;
            outline: none;
            background: #FFFFFF;
            color: #1A1F2E;
            transition: all 0.15s ease;
            box-sizing: border-box;
        }

        .login-box input:focus,
        .login-box select:focus {
            border-color: #00BF62;
            box-shadow: 0 0 0 3px rgba(0, 191, 98, 0.1);
        }

        .login-box button {
            width: 100%;
            padding: 12px 24px;
            margin-top: 24px;
            background: #00BF62;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 12px rgba(0, 191, 98, 0.25);
        }

        .login-box button:hover {
            background: #009951;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #E5E7EB;
        }

        .divider span {
            position: relative;
            background: #FFFFFF;
            padding: 0 16px;
            font-size: 14px;
            color: #6B7280;
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            margin-top: 24px;
            color: #6B7280;
            line-height: 1.6;
        }

        .register-link a {
            color: #00BF62;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.15s ease;
        }

        .register-link a:hover {
            color: #009951;
        }

        .error-message {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
            text-align: center;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-weight: 500;
            line-height: 1.6;
        }

        .success-message {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #6EE7B7;
            text-align: center;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-weight: 500;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 16px;
            }

            .login-box {
                padding: 32px 24px;
            }

            .login-box h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Sign in to your account to continue</p>

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>

            <div class="form-group">
                <label>Role</label>
                <select name="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="contractor">Contractor</option>
                    <option value="council">Council</option>
                </select>
            </div>

            <button type="submit">Sign In</button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <p class="register-link">
            Don't have an account?
            <a href="{% url 'register' %}">Create an account</a>
        </p>
    </div>
</div>

</body>
</html>
